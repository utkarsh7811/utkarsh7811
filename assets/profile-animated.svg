<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Clip path for circular avatar -->
    <clipPath id="circleView">
      <circle cx="100" cy="100" r="75" />
    </clipPath>
    
    <!-- Neon gradient for the animated glow ring -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Gaussian blur for realistic glow shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0% { transform: scale(0.97); opacity: 0.8; }
      50% { transform: scale(1.03); opacity: 1; }
      100% { transform: scale(0.97); opacity: 0.8; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
    .rotating-ring {
      transform-origin: 100px 100px;
      animation: rotate 12s linear infinite;
    }
    .glowing-ring {
      transform-origin: 100px 100px;
      animation: pulse 4s ease-in-out infinite;
    }
    .avatar-group {
      animation: float 5s ease-in-out infinite;
      transform-origin: 100px 100px;
    }
  </style>

  <!-- Glowing outer background ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="url(#glowGrad)" stroke-width="4" filter="url(#glow)" class="glowing-ring" />

  <!-- Animated rotating dashed border -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8 12" class="rotating-ring" />

  <!-- Floating avatar section -->
  <g class="avatar-group">
    <!-- Dark circle background behind image for clean border spacing -->
    <circle cx="100" cy="100" r="75" fill="#0d1117" />
    <!-- User avatar image -->
    <image href="https://github.com/utkarsh7811.png" xlink:href="https://github.com/utkarsh7811.png" x="25" y="25" width="150" height="150" clip-path="url(#circleView)" />
  </g>
</svg>
